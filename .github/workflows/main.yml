name: NASA Data Downloader

on:
  workflow_dispatch: # 버튼을 눌러 수동으로 실행

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run downloader
        env:
          NASA_USER: ${{ secrets.NASA_USER }}
          NASA_PASS: ${{ secrets.NASA_PASS }}
        run: python downloader.py # 다운로더 파일명이 downloader.py라고 가정

      - name: Commit and Push data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/*.gz
          git commit -m "Add new NASA data" || exit 0
          git push
